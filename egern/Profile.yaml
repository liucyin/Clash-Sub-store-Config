      flatten: true
      filter: '(?i)🇬🇧|英国|伦敦|\b(?:UK|GB|United\s*Kingdom)(?:\d+)?\b'
      icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_Kingdom.png
  - select:
      name: 全球手动选择
      policies: [全部节点]
      flatten: true
      filter: '(?i)^(?!.*(?:群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|版本|过期|已用|联系|邮箱|工单|通知|国内|地址|频道|说明|使用|提示|教程|更新|作者|超时|USE|USED|TOTAL|EXPIRE|EMAIL|PANEL|CHANNEL|AUTHOR|TRAFFIC|\d{4}-\d{2}-\d{2}|\d+G)).+$'
      icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png

